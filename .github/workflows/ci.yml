name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  JAVA_VERSION: "21"
  IMAGE_NAME: archive-api

jobs:
  test-and-validate-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=sha,format=short,prefix=sha-
            type=ref,event=branch
            type=raw,value=pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build container image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke test container
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_TAG="$(echo '${{ steps.meta.outputs.tags }}' | head -n 1)"
          docker run --rm -d --name archive-api-ci -p 18080:8080 "$IMAGE_TAG"
          trap 'docker logs archive-api-ci || true; docker stop archive-api-ci || true' EXIT

          for _ in {1..30}; do
            if curl --fail --silent http://127.0.0.1:18080/api/v1/admin/health > /tmp/archive-health.json; then
              break
            fi
            sleep 2
          done

          grep '"status":"UP"' /tmp/archive-health.json

      - name: Publish build summary
        run: |
          {
            echo "## CI result"
            echo
            echo "- Image tags:"
            echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- /'
            echo "- Image digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
